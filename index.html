<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#B4502E" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="CookCapable" />
<title>CookCapable — Cook From Your Shelf</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icons/icon.svg" />
<link href="fonts/fonts.css" rel="stylesheet" />
<script src="vendor/html5-qrcode.min.js" defer></script>
<script src="vendor/supabase.js"></script>
<style>
:root{
  --cream:#FBF7F0; --cream-2:#F4ECDF; --paper:#FFFDF9;
  --ink:#2A211B; --ink-2:#6A5E52; --ink-3:#9C8E7E;
  --line:#E7DDCC; --line-2:#EFE7D8;
  --terra:#B4502E; --terra-soft:#F3DACE; --terra-ink:#8C3C20;
  --herb:#2F6B4F; --herb-soft:#D9E8DF;
  --saffron:#E0A458; --saffron-soft:#F8E9CF;
  --danger:#C0392B; --danger-soft:#F6DAD5;
  --shadow:0 1px 2px rgba(42,33,27,.04), 0 8px 24px -12px rgba(42,33,27,.18);
  --shadow-lg:0 8px 40px -8px rgba(42,33,27,.28);
  --r:18px; --r-sm:12px; --r-lg:26px;
  --maxw:560px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --nav-h:64px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:"Plus Jakarta Sans",system-ui,-apple-system,sans-serif;
  background:var(--cream); color:var(--ink);
  line-height:1.45; -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
h1,h2,h3,h4,.serif{font-family:"Newsreader",Georgia,serif;font-weight:600;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
::placeholder{color:var(--ink-3)}
a{color:var(--terra);text-decoration:none}
.hidden{display:none!important}

/* ---------- App shell ---------- */
#app{max-width:var(--maxw);margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;background:var(--cream);
  box-shadow:0 0 80px -30px rgba(42,33,27,.25)}
.screen{padding:0 0 calc(var(--nav-h) + var(--safe-b) + 24px);min-height:100dvh}

/* ---------- Top bar ---------- */
.topbar{position:sticky;top:0;z-index:40;background:linear-gradient(var(--cream) 70%,rgba(251,247,240,0));
  padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 8px}
.topbar-row{display:flex;align-items:center;gap:12px;min-height:40px}
.topbar h1{font-size:30px;line-height:1.05;margin:0;flex:1}
.topbar .sub{font-size:13px;color:var(--ink-2);margin:2px 0 0}
.iconbtn{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:var(--paper);
  border:1px solid var(--line);box-shadow:var(--shadow);color:var(--ink);flex:none;transition:transform .12s, background .12s}
.iconbtn:active{transform:scale(.92)}
.iconbtn.primary{background:var(--terra);color:#fff;border-color:transparent}
.iconbtn svg{width:20px;height:20px}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--ink-2);font-weight:600;font-size:14px;padding:6px 4px;margin:-6px 0 2px}
.back svg{width:18px;height:18px}

/* ---------- Search ---------- */
.searchbar{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);
  border-radius:var(--r);padding:0 14px;height:46px;box-shadow:var(--shadow);margin:8px 18px 4px}
.searchbar svg{width:18px;height:18px;color:var(--ink-3);flex:none}
.searchbar input{border:none;outline:none;background:none;flex:1;height:100%;color:var(--ink)}
.searchbar .clear{color:var(--ink-3);font-size:13px;font-weight:600}

/* ---------- Chips ---------- */
.chips{display:flex;gap:8px;overflow-x:auto;padding:10px 18px 6px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;border:1px solid var(--line);background:var(--paper);color:var(--ink-2);
  padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;white-space:nowrap;transition:all .12s}
.chip[aria-pressed="true"]{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.chip.green[aria-pressed="true"]{background:var(--herb);border-color:var(--herb)}
.chip .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}

/* ---------- Lists & cards ---------- */
.list{padding:6px 18px 0;display:flex;flex-direction:column;gap:12px}
.section-label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);
  padding:18px 20px 2px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
  overflow:hidden;transition:transform .1s}
.card:active{transform:scale(.99)}
.row{display:flex;align-items:center;gap:14px;padding:14px;width:100%;text-align:left}
.row .grow{flex:1;min-width:0}
.row h3{font-size:18px;margin:0 0 2px;line-height:1.2}
.row .meta{font-size:13px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .meta b{color:var(--terra);font-weight:700}
.thumb{width:54px;height:72px;border-radius:8px;object-fit:cover;flex:none;background:var(--cream-2);
  display:grid;place-items:center;color:var(--ink-3);box-shadow:var(--shadow)}
.thumb.sq{width:56px;height:56px;border-radius:12px}
.thumb.book{box-shadow:2px 3px 10px -3px rgba(42,33,27,.4)}
.chev{color:var(--ink-3);flex:none}
.chev svg{width:18px;height:18px}

/* cookbook cover grid */
.bookgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:8px 18px 0}
.bookcard{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
  padding:14px;display:flex;flex-direction:column;gap:10px}
.bookcard .cover{aspect-ratio:3/4;border-radius:10px;background:linear-gradient(135deg,var(--terra-soft),var(--saffron-soft));
  display:grid;place-items:center;overflow:hidden;box-shadow:2px 4px 14px -4px rgba(42,33,27,.45);position:relative}
.bookcard .cover img{width:100%;height:100%;object-fit:cover}
.bookcard .cover .spine{position:absolute;left:0;top:0;bottom:0;width:6px;background:rgba(0,0,0,.12)}
.bookcard .cover .ph{font-family:"Newsreader",serif;font-size:15px;text-align:center;padding:14px;color:var(--terra-ink);font-weight:600}
.bookcard h3{font-size:16px;margin:0;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bookcard .by{font-size:12px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bookcard .count{font-size:12px;color:var(--terra);font-weight:700;margin-top:auto}

/* ---------- Pills / badges ---------- */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 9px;border-radius:999px}
.badge.have{background:var(--herb-soft);color:var(--herb)}
.badge.need{background:var(--terra-soft);color:var(--terra-ink)}
.badge.tag{background:var(--cream-2);color:var(--ink-2)}

/* match ring */
.ring{--p:0;width:46px;height:46px;border-radius:50%;flex:none;display:grid;place-items:center;
  background:conic-gradient(var(--herb) calc(var(--p)*1%), var(--line-2) 0)}
.ring i{width:36px;height:36px;border-radius:50%;background:var(--paper);display:grid;place-items:center;
  font-size:12px;font-weight:800;font-style:normal;color:var(--herb)}
.ring.low{background:conic-gradient(var(--saffron) calc(var(--p)*1%), var(--line-2) 0)}
.ring.low i{color:var(--saffron)}
.ring.zero i{color:var(--ink-3)}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:50px;padding:0 20px;border-radius:14px;
  font-weight:700;font-size:15px;background:var(--ink);color:var(--cream);transition:transform .1s,opacity .1s;width:100%}
.btn:active{transform:scale(.98)}
.btn.terra{background:var(--terra);color:#fff}
.btn.herb{background:var(--herb);color:#fff}
.btn.ghost{background:var(--paper);color:var(--ink);border:1px solid var(--line);box-shadow:var(--shadow)}
.btn.sm{height:40px;font-size:13px;padding:0 14px;width:auto;border-radius:11px}
.btn.danger{background:var(--danger-soft);color:var(--danger)}
.btn svg{width:18px;height:18px}
.btn[disabled]{opacity:.45;pointer-events:none}

/* ---------- Empty state ---------- */
.empty{text-align:center;padding:60px 32px;color:var(--ink-2)}
.empty .ic{width:84px;height:84px;border-radius:50%;background:var(--cream-2);display:grid;place-items:center;margin:0 auto 18px;color:var(--terra)}
.empty .ic svg{width:38px;height:38px}
.empty h2{font-size:22px;margin:0 0 8px;color:var(--ink)}
.empty p{font-size:14px;margin:0 auto 20px;max-width:260px}

/* ---------- Bottom nav ---------- */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:50;height:calc(var(--nav-h) + var(--safe-b));
  padding-bottom:var(--safe-b);background:rgba(255,253,249,.9);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;max-width:var(--maxw);margin:0 auto}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--ink-3);font-size:11px;font-weight:700;height:var(--nav-h)}
.nav button svg{width:24px;height:24px;transition:transform .15s}
.nav button[aria-current="true"]{color:var(--terra)}
.nav button[aria-current="true"] svg{transform:translateY(-1px) scale(1.06)}
.nav .badge-num{position:absolute;top:8px;margin-left:18px;background:var(--terra);color:#fff;font-size:10px;
  min-width:16px;height:16px;border-radius:8px;display:grid;place-items:center;padding:0 4px;font-weight:800}

/* ---------- Sheet / modal ---------- */
.scrim{position:fixed;inset:0;background:rgba(42,33,27,.42);z-index:60;opacity:0;transition:opacity .22s;
  display:flex;align-items:flex-end;justify-content:center}
.scrim.open{opacity:1}
.sheet{background:var(--cream);width:100%;max-width:var(--maxw);max-height:92dvh;border-radius:var(--r-lg) var(--r-lg) 0 0;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;
  box-shadow:var(--shadow-lg);overflow:hidden}
.scrim.open .sheet{transform:translateY(0)}
.sheet-grip{width:40px;height:4px;border-radius:2px;background:var(--line);margin:10px auto 4px;flex:none}
.sheet-head{display:flex;align-items:center;gap:12px;padding:6px 18px 12px;flex:none}
.sheet-head h2{flex:1;font-size:22px;margin:0}
.sheet-body{overflow-y:auto;padding:4px 18px calc(20px + var(--safe-b));-webkit-overflow-scrolling:touch}
.sheet-foot{padding:12px 18px calc(16px + var(--safe-b));border-top:1px solid var(--line);background:var(--paper);flex:none;
  display:flex;gap:10px}

/* ---------- Forms ---------- */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--ink-2);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--paper);border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;color:var(--ink);outline:none;transition:border .12s,box-shadow .12s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--terra);box-shadow:0 0 0 3px var(--terra-soft)}
.field textarea{resize:vertical;min-height:90px;line-height:1.5}
.field .hint{font-size:12px;color:var(--ink-3);margin-top:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:.8fr .8fr 1.4fr;gap:8px}
.ing-row{display:grid;grid-template-columns:.7fr .7fr 1.6fr auto;gap:7px;align-items:center;margin-bottom:8px}
.ing-row input{padding:10px;border-radius:10px;min-width:0;width:100%}
.ing-row .del{width:34px;height:34px;border-radius:9px;background:var(--danger-soft);color:var(--danger);display:grid;place-items:center}
.addrow{font-weight:700;color:var(--terra);font-size:14px;display:inline-flex;align-items:center;gap:6px;padding:8px 0}
.addrow svg{width:16px;height:16px}

/* scanner */
.scan-wrap{position:relative;border-radius:var(--r);overflow:hidden;background:#000;aspect-ratio:4/3;margin-bottom:14px}
#reader{width:100%}
#reader video{object-fit:cover!important}
.scan-frame{position:absolute;inset:18% 12%;border:3px solid rgba(255,255,255,.9);border-radius:14px;
  box-shadow:0 0 0 1000px rgba(0,0,0,.35);pointer-events:none}
.scan-line{position:absolute;left:12%;right:12%;height:2px;background:var(--terra);box-shadow:0 0 12px var(--terra);
  animation:scan 2.2s ease-in-out infinite;top:30%}
@keyframes scan{0%,100%{top:30%}50%{top:68%}}
.scan-status{text-align:center;font-size:13px;color:var(--ink-2);margin-bottom:10px;min-height:18px}
/* recipe page scanner */
video#rv{width:100%;height:100%;object-fit:cover;display:block}
.qbadge{position:absolute;left:50%;translate:-50% 0;bottom:12px;background:rgba(42,33,27,.78);color:#fff;
  padding:7px 15px;border-radius:999px;font-size:13px;font-weight:700;white-space:nowrap}
.qbadge.ok{background:rgba(47,107,79,.94)} .qbadge.warn{background:rgba(180,80,46,.94)}
.qmeter{height:7px;border-radius:4px;background:var(--line-2);overflow:hidden;margin:12px 0 2px}
.qmeter i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--saffron),var(--herb));transition:width .12s}
.qmeter-lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px}
.cand{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
.cand-head{display:flex;align-items:center;gap:10px}
.cand-n{width:26px;height:26px;border-radius:50%;background:var(--terra);color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px;flex:none}
.cand-head .c-name{flex:1;font-weight:600;font-size:16px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--cream);outline:none}
.cand-head .c-name:focus{border-color:var(--terra);box-shadow:0 0 0 3px var(--terra-soft)}
.cand-del{width:36px;height:36px;border-radius:10px;background:var(--danger-soft);color:var(--danger);display:grid;place-items:center;flex:none}
.cand-sub{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);margin:14px 0 8px}
.cand .c-steps{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;background:var(--cream);resize:vertical;line-height:1.5;outline:none}
.cand .c-steps:focus{border-color:var(--terra);box-shadow:0 0 0 3px var(--terra-soft)}

/* recipe / detail */
.hero{padding:4px 18px 6px}
.hero .cover-lg{width:96px;height:128px;border-radius:12px;object-fit:cover;float:left;margin:0 16px 6px 0;
  box-shadow:3px 5px 18px -5px rgba(42,33,27,.5);background:var(--cream-2)}
.hero h1{font-size:26px;margin:0 0 4px;line-height:1.12}
.hero .by{color:var(--ink-2);font-size:14px}
.hero .stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;clear:both;padding-top:8px}
.detail-block{padding:14px 18px}
.detail-block h3{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin:0 0 10px;font-family:"Plus Jakarta Sans",sans-serif;font-weight:700}
.ing-list{display:flex;flex-direction:column;gap:2px}
.ing-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;background:var(--paper);border:1px solid var(--line-2)}
.ing-item .q{font-weight:700;color:var(--ink);font-size:14px;min-width:64px;flex:none}
.ing-item .n{flex:1}
.ing-item.miss{background:var(--paper)}
.ing-item .tick{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;flex:none}
.ing-item .tick.y{background:var(--herb);color:#fff}
.ing-item .tick.n{background:var(--cream-2);color:var(--ink-3);border:1px dashed var(--line)}
.steps{counter-reset:s;display:flex;flex-direction:column;gap:14px}
.step{display:flex;gap:14px}
.step .num{counter-increment:s;flex:none;width:28px;height:28px;border-radius:50%;background:var(--terra);color:#fff;
  display:grid;place-items:center;font-weight:800;font-size:14px}
.step .num::before{content:counter(s)}
.step p{margin:2px 0;font-size:15px;line-height:1.55}

/* selectable list (plan) */
.sel-row{display:flex;align-items:center;gap:12px;padding:13px 14px}
.checkbox{width:24px;height:24px;border-radius:8px;border:2px solid var(--line);flex:none;display:grid;place-items:center;
  background:var(--paper);transition:all .12s}
.checkbox.on{background:var(--herb);border-color:var(--herb);color:#fff}
.checkbox svg{width:15px;height:15px}

/* grocery */
.gro-item{display:flex;align-items:center;gap:12px;padding:13px 14px}
.gro-item.done .gname{text-decoration:line-through;color:var(--ink-3)}
.gname{flex:1}
.gqty{font-size:13px;color:var(--ink-2);font-weight:700;background:var(--cream-2);padding:3px 9px;border-radius:8px}
.gdel{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--ink-3);flex:none}
.gdel:active{background:var(--danger-soft);color:var(--danger)}
.gdel svg{width:16px;height:16px}

/* qty stepper */
.stepper{display:inline-flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--paper)}
.stepper button{width:34px;height:34px;display:grid;place-items:center;color:var(--terra);font-size:18px;font-weight:700}
.stepper span{min-width:40px;text-align:center;font-weight:700;font-size:14px}

/* toast */
#toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + 18px + var(--safe-b));
  translate:-50% 20px;z-index:120;background:var(--ink);color:var(--cream);padding:12px 18px;border-radius:14px;
  font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .2s,translate .2s;
  max-width:88%;display:flex;align-items:center;gap:9px}
#toast.show{opacity:1;translate:-50% 0}
#toast.ok{background:var(--herb)} #toast.warn{background:var(--terra)}
#toast svg{width:18px;height:18px;flex:none}

/* misc */
.fab{position:fixed;right:max(18px,calc(50% - var(--maxw)/2 + 18px));bottom:calc(var(--nav-h) + var(--safe-b) + 18px);
  z-index:45;width:58px;height:58px;border-radius:20px;background:var(--terra);color:#fff;display:grid;place-items:center;
  box-shadow:0 8px 24px -6px rgba(180,80,46,.7);transition:transform .12s}
.fab:active{transform:scale(.9)}
.fab svg{width:26px;height:26px}
.divider{height:1px;background:var(--line);margin:8px 18px}
.swipe-hint{font-size:12px;color:var(--ink-3);text-align:center;padding:8px}
.skeleton{background:linear-gradient(90deg,var(--cream-2),var(--line-2),var(--cream-2));background-size:200% 100%;
  animation:sk 1.3s infinite;border-radius:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.muted{color:var(--ink-2);font-size:13px}
.center{text-align:center}
.mt{margin-top:14px}.mb{margin-bottom:14px}
.linkbtn{color:var(--terra);font-weight:700;font-size:14px}
/* ---------- Auth / paywall gate ---------- */
#gate{position:fixed;inset:0;z-index:90;background:var(--cream);display:none;overflow-y:auto;
  padding:calc(env(safe-area-inset-top,0px) + 8px) 0 calc(env(safe-area-inset-bottom,0px) + 24px)}
#gate.show{display:block}
.gate-wrap{max-width:var(--maxw);margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:24px 26px}
.gate-brand{text-align:center;margin-bottom:6px}
.gate-mark{width:72px;height:72px;border-radius:20px;margin:0 auto 16px;display:block;box-shadow:var(--shadow-lg)}
.gate-brand h1{font-size:34px;margin:0;line-height:1.05}
.gate-brand .tag{color:var(--ink-2);font-size:14px;margin-top:4px}
.gate-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);
  padding:22px 20px;margin-top:24px}
.gate-card h2{font-size:22px;margin:0 0 4px}
.gate-card .sub{color:var(--ink-2);font-size:14px;margin:0 0 18px}
.gate-err{background:var(--danger-soft);color:var(--danger);border-radius:12px;padding:10px 13px;font-size:13px;font-weight:600;margin-bottom:14px;display:none}
.gate-err.show{display:block}

const svg = (name)=>I[name]||'';

/* ---------------- Store (localStorage, JSON) ---------------- */
const DB_KEY='cookcapable.v1';
const uid=()=> 'x'+(performance.now().toString(36).replace('.','')) + Math.floor(Math.random()*1e6).toString(36);
const store = {
  data:{cookbooks:[],recipes:[],pantry:[],grocery:[],meta:{seeded:false}},
  load(){
    try{const r=localStorage.getItem(DB_KEY); if(r) this.data=JSON.parse(r);}catch(e){console.warn('load',e);}
    const d=this.data; d.cookbooks=d.cookbooks||[]; d.recipes=d.recipes||[]; d.pantry=d.pantry||[];
    d.grocery=d.grocery||[]; d.mealPlan=d.mealPlan||[]; d.meta=d.meta||{seeded:false};
  },
  save(){
    try{localStorage.setItem(DB_KEY,JSON.stringify(this.data));}
    catch(e){toast('Storage is full. Export a backup from Settings.','warn');}
  },
  // cookbooks
  cookbook(id){return this.data.cookbooks.find(c=>c.id===id);},
  recipesOf(id){return this.data.recipes.filter(r=>r.cookbookId===id);},
  addCookbook(c){c.id=c.id||uid();c.createdAt=Date.now();this.data.cookbooks.unshift(c);this.save();return c;},
  updateCookbook(id,patch){const c=this.cookbook(id);if(c){Object.assign(c,patch);this.save();}return c;},
  deleteCookbook(id){this.data.recipes=this.data.recipes.filter(r=>r.cookbookId!==id);
    this.data.cookbooks=this.data.cookbooks.filter(c=>c.id!==id);this.save();},
  // recipes
  recipe(id){return this.data.recipes.find(r=>r.id===id);},
  addRecipe(r){r.id=r.id||uid();r.createdAt=Date.now();this.data.recipes.unshift(r);this.save();return r;},
  updateRecipe(id,patch){const r=this.recipe(id);if(r){Object.assign(r,patch);this.save();}return r;},
  deleteRecipe(id){this.data.recipes=this.data.recipes.filter(r=>r.id!==id);this.save();},
  // pantry
  pantryItem(id){return this.data.pantry.find(p=>p.id===id);},
  addPantry(p){p.id=p.id||uid();p.createdAt=Date.now();this.data.pantry.unshift(p);this.save();return p;},
  updatePantry(id,patch){const p=this.pantryItem(id);if(p){Object.assign(p,patch);this.save();}return p;},
  deletePantry(id){this.data.pantry=this.data.pantry.filter(p=>p.id!==id);this.save();},
};

/* ---------------- External lookups (free, no key) ---------------- */
/* fetch JSON with a hard timeout — a slow/throttled API must never hang a flow.
   Uses Promise.race against a timer so it resolves even if fetch/abort never settles. */
function fetchJSON(url,ms){
  ms=ms||7000;
  const ctl=(typeof AbortController!=='undefined')?new AbortController():null;
  const req=fetch(url,ctl?{signal:ctl.signal}:undefined).then(r=>r.ok?r.json():null).catch(()=>null);
  const timer=new Promise(res=>setTimeout(()=>{if(ctl){try{ctl.abort();}catch(e){}} res(null);},ms));
  return Promise.race([req,timer]);
}
async function lookupISBN(isbn){
  isbn=(isbn||'').replace(/[^0-9Xx]/g,'');
  const g=await fetchJSON('https://www.googleapis.com/books/v1/volumes?q=isbn:'+isbn);
  if(g&&g.totalItems>0){
    const v=g.items[0].volumeInfo;
    return {found:true,title:v.title||'',author:(v.authors||[]).join(', '),
      publisher:v.publisher||'',year:(v.publishedDate||'').slice(0,4),
      cover:(v.imageLinks&&(v.imageLinks.thumbnail||v.imageLinks.smallThumbnail)||'').replace('http://','https://'),isbn};
  }
  const o=await fetchJSON('https://openlibrary.org/api/books?bibkeys=ISBN:'+isbn+'&format=json&jscmd=data');
  const k=o&&o['ISBN:'+isbn];
  if(k) return {found:true,title:k.title||'',author:(k.authors||[]).map(a=>a.name).join(', '),
    publisher:(k.publishers||[]).map(p=>p.name).join(', '),year:(k.publish_date||'').slice(-4),
    cover:(k.cover&&(k.cover.medium||k.cover.large))||'',isbn};
  return {found:false,isbn};
}
async function lookupUPC(upc){
  upc=(upc||'').replace(/[^0-9]/g,'');
  const j=await fetchJSON('https://world.openfoodfacts.org/api/v2/product/'+upc+'.json?fields=product_name,brands,image_front_small_url,categories_tags_en,quantity');
  if(j&&j.status===1&&j.product){
    const p=j.product, cats=p.categories_tags_en||[];
    return {found:true,name:p.product_name||'',brand:(p.brands||'').split(',')[0].trim(),
      image:p.image_front_small_url||'',category:guessCategory(cats.join(' ')+' '+(p.product_name||'')),
      size:p.quantity||'',upc};
  }
  return {found:false,upc};
}

/* ---------------- Matching engine ---------------- */
const STOP=new Set(('fresh dried ground chopped minced sliced diced large small medium ripe boneless skinless extra '+
 'virgin taste optional cup cups tbsp tsp tsp tablespoon tablespoons teaspoon teaspoons oz ounce ounces lb lbs pound '+
 'pounds gram grams kg ml l liter clove cloves can cans package pkg jar slice slices pinch stick sticks bunch handful '+
 'of for and the a an to into about plus more some warm cold hot room temperature finely roughly thinly').split(' '));
function normName(s){
  return (s||'').toLowerCase()
    .replace(/\([^)]*\)/g,' ').replace(/[^a-z0-9\s]/g,' ')
    .replace(/\d+/g,' ').replace(/\s+/g,' ').trim()
    .split(' ').map(w=> w.length>3&&w.endsWith('s')? w.slice(0,-1):w).join(' ');
}
function keyTokens(s){
  return new Set(normName(s).split(' ').filter(w=>w.length>=3&&!STOP.has(w)));
}
function namesMatch(ingName,pantryName){
  const a=keyTokens(ingName), b=keyTokens(pantryName);
  if(!a.size||!b.size) return false;
  for(const w of b){ if(a.has(w)) return true; }
  // loose contains for compound (e.g. "olive oil" vs "extra virgin olive oil")
  const an=normName(ingName), bn=normName(pantryName);
  return (bn.length>=4&&an.includes(bn))||(an.length>=4&&bn.includes(an));
}
function ingredientInPantry(ingName){
  return store.data.pantry.some(p=> (p.qty===undefined||p.qty>0) && namesMatch(ingName,p.name));
}
function recipeMatch(recipe){
  const ings=(recipe.ingredients||[]).filter(i=>i.name&&i.name.trim());
  let have=0; const missing=[];
  ings.forEach(i=>{ if(ingredientInPantry(i.name)) have++; else missing.push(i); });
  const total=ings.length;
  return {have,total,missing,pct: total? Math.round(have/total*100):0};
}

/* ---------------- UI helpers ---------------- */
const $=(s,r=document)=>r.querySelector(s);
const el=(html)=>{const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstElementChild;};
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
let toastT;
function toast(msg,type){
  const t=$('#toast'); t.className=''; if(type)t.classList.add(type);
  const ic=type==='warn'?svg('info'):svg('check');
  t.innerHTML=ic+'<span>'+esc(msg)+'</span>';
  requestAnimationFrame(()=>t.classList.add('show'));
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2400);
}
function plural(n,w){return n+' '+w+(n===1?'':'s');}
function fmtQty(i){return [i.qty,i.unit].filter(Boolean).join(' ');}

/* ---------------- Navigation state ---------------- */
const TABS=[
  {id:'cookbooks',label:'Cookbooks',icon:'book'},
  {id:'pantry',label:'Pantry',icon:'pantry'},
  {id:'cook',label:'Cook',icon:'cook'},
  {id:'search',label:'Search',icon:'search'},
];
let nav=[{view:'cookbooks',tab:'cookbooks'}];
let ui={cookFilter:'all',planSel:new Set(),query:'',pantryQ:''};
const curTab=()=> (nav[nav.length-1].tab)||'cookbooks';
function go(view,params){nav.push({view,params:params||{},tab:curTab()});render();window.scrollTo(0,0);}
function back(){if(nav.length>1){nav.pop();render();}}
function setTab(tab){nav=[{view:tab,tab}];ui.query='';render();window.scrollTo(0,0);}
function replace(view,params){nav[nav.length-1]={view,params:params||{},tab:curTab()};render();}

/* ---------------- Render root ---------------- */
function render(){
  const node=nav[nav.length-1];
  const screen=$('#screen');
  const fns={cookbooks:viewCookbooks,pantry:viewPantry,cook:viewCook,search:viewSearch,
    cookbook:viewCookbook,recipe:viewRecipe};
  const fn=fns[node.view]||viewCookbooks;
  screen.innerHTML='';
  screen.appendChild(fn(node.params||{}));
  renderNav();
}
function renderNav(){
  const nav$=$('#nav'); const active=curTab();
  const groceryCount=store.data.grocery.filter(g=>!g.done).length;
  nav$.innerHTML=TABS.map(t=>{
    const badge=(t.id==='cook'&&groceryCount)?'<span class="badge-num">'+groceryCount+'</span>':'';
    return '<button data-tab="'+t.id+'" aria-current="'+(active===t.id)+'">'+badge+svg(t.icon)+'<span>'+t.label+'</span></button>';
  }).join('');
  nav$.querySelectorAll('button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
}

/* =========================================================================
   VIEW: Cookbooks
   ========================================================================= */
function viewCookbooks(){
  const wrap=el('<div></div>');
  const tb=topbar({title:'Cookbooks',sub:plural(store.data.cookbooks.length,'book')+' · '+plural(store.data.recipes.length,'recipe'),
    action:{icon:'scan',label:'Add cookbook',primary:true,onClick:openAddCookbook}});
  const gear=el('<button class="iconbtn" aria-label="Settings">'+svg('gear')+'</button>');
  gear.onclick=openSettings;
  tb.querySelector('.topbar-row').insertBefore(gear,tb.querySelector('.iconbtn.primary'));
  wrap.appendChild(tb);
  const q=ui.query.toLowerCase();
  wrap.appendChild(searchInput('Search books, recipes & ingredients…',q,(v)=>{ui.query=v;rerenderCookbookList(wrap);}));
  const listHost=el('<div id="cb-list"></div>');
  wrap.appendChild(listHost);
  fillCookbookList(listHost);
  return wrap;
}
function rerenderCookbookList(wrap){const h=$('#cb-list',wrap);if(h)fillCookbookList(h);}
function fillCookbookList(host){
  const q=ui.query.toLowerCase().trim();
  let books=store.data.cookbooks;
  let matchedRecipes=[];
  if(q){
    matchedRecipes=store.data.recipes.filter(r=>r.name.toLowerCase().includes(q)
      || (r.ingredients||[]).some(i=>(i.name||'').toLowerCase().includes(q))
      || (r.tags||[]).some(t=>t.toLowerCase().includes(q)));
    books=books.filter(c=> c.title.toLowerCase().includes(q) || (c.author||'').toLowerCase().includes(q)
      || matchedRecipes.some(r=>r.cookbookId===c.id));
  }
  host.innerHTML='';
  if(!store.data.cookbooks.length){
    host.appendChild(emptyState('book','Your shelf is empty',
      'Scan a cookbook’s barcode (ISBN) to log it, then add the recipes you love.',
      [{label:'Scan a cookbook',cls:'terra',icon:'scan',onClick:openAddCookbook},
       {label:'Load a sample shelf',cls:'ghost',icon:'spark',onClick:seedSample}]));
    return;
  }
  if(q && matchedRecipes.length){
    const lbl=el('<div class="section-label">Matching recipes</div>');host.appendChild(lbl);
    const l=el('<div class="list"></div>');
    matchedRecipes.slice(0,8).forEach(r=>l.appendChild(recipeRow(r,true)));
    host.appendChild(l);
    host.appendChild(el('<div class="section-label">Cookbooks</div>'));
  }
  if(!books.length){host.appendChild(noResults('No cookbooks match “'+esc(q)+'”'));return;}
  const grid=el('<div class="bookgrid"></div>');
  books.forEach(c=>grid.appendChild(bookCard(c)));
  host.appendChild(grid);
}
function bookCard(c){
  const n=store.recipesOf(c.id).length;
  const coverInner = c.cover
    ? '<img src="'+esc(c.cover)+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'grid\'"><div class="ph" style="display:none">'+esc(c.title)+'</div>'
    : '<div class="ph">'+esc(c.title)+'</div>';
  const card=el('<button class="bookcard"><div class="cover"><span class="spine"></span>'+coverInner+'</div>'+
    '<h3>'+esc(c.title)+'</h3>'+
    (c.author?'<div class="by">'+esc(c.author)+'</div>':'')+
    '<div class="count">'+plural(n,'recipe')+'</div></button>');
  card.onclick=()=>go('cookbook',{id:c.id});
  return card;
}

/* VIEW: single cookbook */
function viewCookbook(p){
  const c=store.cookbook(p.id);
  const wrap=el('<div></div>');
  if(!c){wrap.appendChild(topbarBack('Cookbook'));wrap.appendChild(noResults('Cookbook not found'));return wrap;}
  wrap.appendChild(topbarBack(c.title,{icon:'dots',onClick:()=>cookbookMenu(c)}));
  const hero=el('<div class="hero"></div>');
  const cover=c.cover?'<img class="cover-lg" src="'+esc(c.cover)+'" alt="" onerror="this.remove()">':'';
  hero.innerHTML=cover+'<h1>'+esc(c.title)+'</h1>'+
    (c.author?'<div class="by">'+esc(c.author)+'</div>':'')+
    '<div class="by">'+[c.publisher,c.year].filter(Boolean).map(esc).join(' · ')+(c.isbn?' · ISBN '+esc(c.isbn):'')+'</div>';
  wrap.appendChild(hero);
  const recs=store.recipesOf(c.id);
  const bar=el('<div class="list" style="padding-top:14px"></div>');
  const add=el('<button class="btn terra"><span>'+svg('plus')+'</span>Add a recipe</button>');
  add.onclick=()=>openAddRecipe(c.id);
  bar.appendChild(add);
  wrap.appendChild(bar);
  wrap.appendChild(el('<div class="section-label">'+plural(recs.length,'recipe')+'</div>'));
  if(!recs.length){
    wrap.appendChild(emptyState('cook','No recipes yet','Add the recipes from this book — scan a page and CookCapable reads it for you, or type them in.',
      [{label:'Scan a recipe',cls:'terra',icon:'scan',onClick:()=>openRecipeScanner(c.id)},
       {label:'Type one in',cls:'ghost',icon:'keyboard',onClick:()=>openRecipeForm({cookbookId:c.id})}]));
  }else{
    if(ui.bookQId!==c.id){ui.bookQ='';ui.bookQId=c.id;}
    if(recs.length>2)wrap.appendChild(searchInput('Search recipes & ingredients…',ui.bookQ||'',(v)=>{ui.bookQ=v;fillBookRecipes($('#bk-recs',wrap),c.id);}));
    const host=el('<div id="bk-recs"></div>');wrap.appendChild(host);
    fillBookRecipes(host,c.id);
  }
  return wrap;
}
function fillBookRecipes(host,cookbookId){
  if(!host)return;
  const q=(ui.bookQ||'').toLowerCase().trim();
  let recs=store.recipesOf(cookbookId);
  if(q)recs=recs.filter(r=>r.name.toLowerCase().includes(q)

const PANTRY_CATS=['Produce','Meat & Fish','Dairy & Eggs','Bakery','Pantry','Spices','Frozen','Canned','Condiments','Drinks','Other'];
function guessCategory(text){
  text=(text||'').toLowerCase();
  const map=[['Produce',/vegetable|fruit|fresh|lettuce|tomato|onion|garlic|apple|banana|pepper|carrot/],
    ['Meat & Fish',/meat|beef|chicken|pork|fish|seafood|poultry|bacon|sausage/],
    ['Dairy & Eggs',/dairy|milk|cheese|yogurt|butter|cream|egg/],
    ['Bakery',/bread|bakery|bun|bagel|tortilla|roll/],
    ['Spices',/spice|seasoning|pepper|salt|cumin|paprika|herb/],
    ['Frozen',/frozen/],['Canned',/canned|can /],['Condiments',/sauce|ketchup|mustard|mayo|dressing|oil|vinegar/],
    ['Drinks',/beverage|drink|juice|soda|water|coffee|tea/]];
  for(const[c,re]of map){if(re.test(text))return c;}
  return 'Pantry';
}
function viewPantry(){
  const wrap=el('<div></div>');
  wrap.appendChild(topbar({title:'Pantry',sub:plural(store.data.pantry.length,'item')+' on hand',
    action:{icon:'scan',label:'Add item',primary:true,onClick:openAddPantry}}));
  wrap.appendChild(searchInput('Search your pantry…',ui.pantryQ,(v)=>{ui.pantryQ=v;fillPantry($('#p-list',wrap));}));
  const host=el('<div id="p-list"></div>');wrap.appendChild(host);fillPantry(host);
  return wrap;
}
function fillPantry(host){
  if(!host)return;
  const q=ui.pantryQ.toLowerCase().trim();
  let items=store.data.pantry;
  if(q)items=items.filter(p=>p.name.toLowerCase().includes(q)||(p.brand||'').toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q));
  host.innerHTML='';
  if(!store.data.pantry.length){
    host.appendChild(emptyState('pantry','Stock your pantry',
      'Scan a UPC barcode to auto-fill the item, or add things by hand. This is what the app checks your recipes against.',
      [{label:'Scan an item',cls:'terra',icon:'scan',onClick:openAddPantry},
       {label:'Add by hand',cls:'ghost',icon:'keyboard',onClick:()=>openPantryForm({})}]));
    return;
  }
  if(!items.length){host.appendChild(noResults('Nothing matches “'+esc(q)+'”'));return;}
  const groups={};
  items.forEach(p=>{(groups[p.category||'Other']=groups[p.category||'Other']||[]).push(p);});
  const order=PANTRY_CATS.filter(c=>groups[c]);
  Object.keys(groups).forEach(c=>{if(!order.includes(c))order.push(c);});
  order.forEach(cat=>{
    host.appendChild(el('<div class="section-label">'+esc(cat)+' · '+groups[cat].length+'</div>'));
    const l=el('<div class="list"></div>');
    groups[cat].forEach(p=>l.appendChild(pantryRow(p)));
    host.appendChild(l);
  });
}

/* ---- quantity parsing / units (for live inventory + grocery aggregation) ---- */
const FRAC_VAL={'¼':.25,'½':.5,'¾':.75,'⅓':1/3,'⅔':2/3,'⅕':.2,'⅖':.4,'⅗':.6,'⅘':.8,'⅙':1/6,'⅚':5/6,'⅛':.125,'⅜':.375,'⅝':.625,'⅞':.875};
function parseAmount(qty){
  if(qty==null)return null;
  let s=String(qty).trim().toLowerCase();
  if(!s)return null;
  s=s.split(/\s*(?:-|–|to)\s*/)[0].trim()||String(qty).trim().toLowerCase(); // ranges → first value
  let m=s.match(/^(\d+)\s+(\d+)\/(\d+)/); if(m)return (+m[1])+(+m[2])/(+m[3]);   // 1 1/2
  m=s.match(/^(\d+)\/(\d+)/); if(m)return (+m[1])/(+m[2]);                        // 1/2
  if(FRAC_VAL[s[0]]!==undefined)return (s.length>1&&/\d/.test(s[1])?parseFloat(s):FRAC_VAL[s[0]]);
  m=s.match(/^(\d+(?:\.\d+)?)\s*([¼½¾⅓⅔⅕⅖⅗⅘⅙⅚⅛⅜⅝⅞])?/);
  if(m)return parseFloat(m[1])+(m[2]?FRAC_VAL[m[2]]:0);
  return null;
}
function fmtAmount(n){
  if(n==null)return '';
  const r=Math.round(n);
  if(Math.abs(n-r)<1e-6)return String(r);
  const whole=Math.floor(n),frac=n-whole;
  const map=[[.25,'¼'],[.5,'½'],[.75,'¾'],[1/3,'⅓'],[2/3,'⅔']];
  for(const[v,g]of map){if(Math.abs(frac-v)<.02)return (whole?whole+' ':'')+g;}
  return (Math.round(n*100)/100).toString();
}
const UNIT_NORM={tbsp:'tbsp',tbs:'tbsp','tbsp.':'tbsp',tablespoon:'tbsp',tablespoons:'tbsp',tsp:'tsp','tsp.':'tsp',teaspoon:'tsp',teaspoons:'tsp',cup:'cup',cups:'cup',oz:'oz',ounce:'oz',ounces:'oz',lb:'lb',lbs:'lb',pound:'lb',pounds:'lb',g:'g',gram:'g',grams:'g',kg:'kg',ml:'ml',l:'l',liter:'l',litre:'l',clove:'clove',cloves:'clove',can:'can',cans:'can',slice:'slice',slices:'slice',stick:'stick',sticks:'stick',head:'head',bunch:'bunch',pinch:'pinch',sprig:'sprig',sprigs:'sprig',
  /* count synonyms → '' so "Eggs (each)" matches a recipe's "3 eggs" */ each:'',ea:'',count:'',ct:'',pc:'',pcs:'',piece:'',pieces:'',unit:'',units:'',whole:'',x:''};
function normUnit(u){u=(u||'').toLowerCase().trim().replace(/\.$/,'');return (u in UNIT_NORM)?UNIT_NORM[u]:u;}
function unitsCompatible(a,b){return normUnit(a)===normUnit(b);}  // '' vs '' = count, also compatible
function groceryKey(name,unit){return normName(name)+'|'+normUnit(unit);}
function fmtGroceryQty(item){return [fmtAmount(item.amount),item.unit].filter(Boolean).join(' ');}

/* ---- meal plan = committed recipes; adding decrements pantry, shortfalls → grocery ---- */
function inPlan(recipeId){return store.data.mealPlan.some(e=>e.recipeId===recipeId);}
function planEntryFor(recipeId){return store.data.mealPlan.find(e=>e.recipeId===recipeId);}
function groceryAdd(key,name,amount,unit,recipeId){
  let g=store.data.grocery.find(x=>x.key===key);
  if(g){ g.amount=(g.amount==null?0:g.amount)+(amount==null?0:amount);
    if(recipeId){g.recipeIds=g.recipeIds||[];if(!g.recipeIds.includes(recipeId))g.recipeIds.push(recipeId);} }
  else { store.data.grocery.push({id:uid(),key,name,amount:(amount==null?null:amount),unit:normUnit(unit),done:false,recipeIds:recipeId?[recipeId]:[],manual:!recipeId}); }
}
function addToPlan(recipeId){
  const r=store.recipe(recipeId); if(!r)return false;
  if(inPlan(recipeId)){toast('Already in your meal plan','warn');return false;}
  const entry={id:uid(),recipeId,addedAt:Date.now(),deductions:[],groceryAdds:[]};
  (r.ingredients||[]).forEach(ing=>{
    if(!ing.name||!ing.name.trim())return;
    const need=parseAmount(ing.qty); const need2=(need==null?1:need); const unit=ing.unit||'';
    const p=store.data.pantry.find(pp=>namesMatch(ing.name,pp.name));
    let shortfall=need2;
    if(p){
      if(unitsCompatible(unit,p.unit||'')){
        const have=p.qty||0, used=Math.min(need2,have);
        if(used>0){store.updatePantry(p.id,{qty:have-used});entry.deductions.push({pantryId:p.id,amount:used});}
        shortfall=need2-used;
      } else { shortfall=(p.qty||0)>0?0:need2; }   // unit mismatch: assume covered if any stock
    }
    if(shortfall>1e-4){
      const key=groceryKey(ing.name,unit);
      groceryAdd(key,ing.name.trim(),shortfall,unit,recipeId);
      entry.groceryAdds.push({key,amount:shortfall});
    }
  });
  store.data.mealPlan.push(entry);
  store.save();renderNav();
  return true;
}
function removeFromPlan(recipeId){
  const idx=store.data.mealPlan.findIndex(e=>e.recipeId===recipeId);
  if(idx<0)return;
  const entry=store.data.mealPlan[idx];
  entry.deductions.forEach(d=>{const p=store.pantryItem(d.pantryId);if(p)store.updatePantry(p.id,{qty:(p.qty||0)+d.amount});});
  entry.groceryAdds.forEach(a=>{
    const g=store.data.grocery.find(x=>x.key===a.key);
    if(g&&!g.done){ g.amount=(g.amount==null?null:g.amount-a.amount);
      if(g.amount==null||g.amount<=1e-4) store.data.grocery=store.data.grocery.filter(x=>x!==g);
      else { g.recipeIds=(g.recipeIds||[]).filter(id=>id!==recipeId); } }
  });
  store.data.mealPlan.splice(idx,1);
  store.save();renderNav();
}
/* mark a planned meal cooked: consume the full recipe from pantry (the reserved part is
   already deducted, so only take the remainder), clear its grocery items, drop from plan. */
function cookMeal(recipeId){
  const entry=planEntryFor(recipeId); const r=store.recipe(recipeId);
  if(!entry||!r)return;
  (r.ingredients||[]).forEach(ing=>{
    if(!ing.name||!ing.name.trim())return;
    const need=parseAmount(ing.qty); const need2=(need==null?1:need); const unit=ing.unit||'';
    const p=store.data.pantry.find(pp=>namesMatch(ing.name,pp.name));
    if(!p)return;
    const reserved=entry.deductions.filter(d=>d.pantryId===p.id).reduce((s,d)=>s+d.amount,0);
    const remaining=Math.max(0,need2-reserved);
    if(remaining>1e-4 && unitsCompatible(unit,p.unit||''))
      store.updatePantry(p.id,{qty:Math.max(0,(p.qty||0)-remaining)});
  });
  entry.groceryAdds.forEach(a=>{
    const g=store.data.grocery.find(x=>x.key===a.key);
    if(g&&!g.done){ g.amount=(g.amount==null?null:g.amount-a.amount);
      if(g.amount==null||g.amount<=1e-4) store.data.grocery=store.data.grocery.filter(x=>x!==g);
      else g.recipeIds=(g.recipeIds||[]).filter(id=>id!==recipeId); }
  });
  store.data.mealPlan=store.data.mealPlan.filter(e=>e.id!==entry.id);
  store.save();renderNav();
}
function checkedToPantry(){
  const done=store.data.grocery.filter(g=>g.done);
  if(!done.length){toast('Check off what you bought first','warn');return;}
  done.forEach(g=>{
    const add=(g.amount==null?1:g.amount);
    const p=store.data.pantry.find(pp=>normName(pp.name)===normName(g.name));
    if(p){ const inc=unitsCompatible(g.unit,p.unit||'')?add:1; store.updatePantry(p.id,{qty:(p.qty||0)+inc}); }
    else store.addPantry({name:g.name,category:guessCategory(g.name),qty:add,unit:normUnit(g.unit)});
  });
  store.data.grocery=store.data.grocery.filter(g=>!g.done);
  store.save();render();
  toast(plural(done.length,'item')+' added to pantry','ok');
}

/* lazy-load Tesseract.js (bundled locally) only when the scanner is first used */
let _tessLoad;
function loadTesseract(){
  if(window.Tesseract)return Promise.resolve();
  if(_tessLoad)return _tessLoad;
  _tessLoad=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='vendor/tesseract/tesseract.min.js';
    s.onload=()=>res();s.onerror=()=>rej(new Error('offline'));document.head.appendChild(s);
  });
  return _tessLoad;
}
async function runOCR(image,onProgress){
  await loadTesseract();
  // all engine files are bundled under vendor/tesseract → fully offline OCR.
  // Worker runs from a blob, so paths must be absolute (relative URLs fail in-worker).
  const base=new URL('vendor/tesseract/',location.href).href;
  const worker=await Tesseract.createWorker('eng',1,{
    workerPath:base+'worker.min.js',
    corePath:base,
    langPath:base,
    logger:m=>{if(m.status==='recognizing text'&&onProgress)onProgress(m.progress);}
  });
  try{const{data}=await worker.recognize(image);return data;}
  finally{try{await worker.terminate();}catch(e){}}
}

/* image-quality heuristics on a small analysis canvas */
function sharpness(ctx,w,h){
  const{data}=ctx.getImageData(0,0,w,h);let sum=0,n=0;
  for(let y=1;y<h-1;y+=2)for(let x=1;x<w-1;x+=2){
    const i=(y*w+x)*4,g=data[i]*0.3+data[i+1]*0.59+data[i+2]*0.11;
    const ir=(y*w+x+1)*4,gr=data[ir]*0.3+data[ir+1]*0.59+data[ir+2]*0.11;
    const id=((y+1)*w+x)*4,gd=data[id]*0.3+data[id+1]*0.59+data[id+2]*0.11;
    sum+=Math.abs(gr-g)+Math.abs(gd-g);n++;
  }
  return n?sum/n:0;
}
function brightness(ctx,w,h){
  const{data}=ctx.getImageData(0,0,w,h);let s=0,n=0;
  for(let i=0;i<data.length;i+=40){s+=data[i]*0.3+data[i+1]*0.59+data[i+2]*0.11;n++;}
  return n?s/n:0;
}
function downscalePhoto(canvas){
  const max=820,scale=Math.min(1,max/canvas.width);
  if(scale>=1)return canvas.toDataURL('image/jpeg',0.6);
  const c=document.createElement('canvas');c.width=Math.round(canvas.width*scale);c.height=Math.round(canvas.height*scale);
  c.getContext('2d').drawImage(canvas,0,0,c.width,c.height);return c.toDataURL('image/jpeg',0.55);
}

/* generic camera + auto-capture + OCR engine, shared by recipe & cover scanners.
   opts: {title, hint, minWords, minConf, onResult(text, conf, photoDataUrl)} */
function openCaptureScanner(opts){
  let stream=null,raf=0,goodFrames=0,busy=false,closed=false;
  const minWords=opts.minWords||8, minConf=opts.minConf||50;
  const closeSheet=openSheet(opts.title,(body)=>{
    body.appendChild(el('<p class="muted mb">'+esc(opts.hint)+'</p>'));
    body.appendChild(el('<div class="scan-wrap"><video id="rv" playsinline muted></video><div class="scan-frame"></div><div class="qbadge" id="qbadge">Starting camera…</div></div>'));
    body.appendChild(el('<div><div class="qmeter-lbl">Page clarity</div><div class="qmeter"><i id="qfill"></i></div></div>'));
    body.appendChild(el('<div id="ocrprog" class="scan-status"></div>'));
    body.appendChild(el('<div style="display:flex;gap:10px;margin-top:4px"><button class="btn ghost" id="upbtn"><span>'+svg('book')+'</span>Upload photo</button><button class="btn terra" id="capbtn"><span>'+svg('scan')+'</span>Capture now</button></div>'));
    body.appendChild(el('<input type="file" accept="image/*" capture="environment" id="upinput" class="hidden">'));
    const video=$('#rv',body),qbadge=$('#qbadge',body),qfill=$('#qfill',body),prog=$('#ocrprog',body);
    const acanvas=document.createElement('canvas');
    $('#upbtn',body).onclick=()=>$('#upinput',body).click();
    $('#upinput',body).onchange=(e)=>{const f=e.target.files[0];if(f)processFile(f);};
    $('#capbtn',body).onclick=()=>{if(video.videoWidth&&!busy)captureAndProcess(video);};

    (async function startCam(){
      try{
        stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}});
        video.srcObject=stream;await video.play();qbadge.textContent='Hold steady…';loop();
      }catch(e){qbadge.className='qbadge warn';qbadge.textContent='No camera here — upload a photo instead.';}
    })();

    function loop(){
      if(closed)return; raf=requestAnimationFrame(loop);
      if(busy||!video.videoWidth)return;
      const w=240,h=Math.max(1,Math.round(w*video.videoHeight/video.videoWidth));
      acanvas.width=w;acanvas.height=h;
      const ctx=acanvas.getContext('2d',{willReadFrequently:true});
      ctx.drawImage(video,0,0,w,h);
      const s=sharpness(ctx,w,h),b=brightness(ctx,w,h);
      qfill.style.width=Math.min(100,Math.round(s*7))+'%';
      const bright=b>55&&b<235, sharp=s>8.5;
      if(sharp&&bright){goodFrames++;qbadge.className='qbadge ok';qbadge.textContent=goodFrames>=10?'Capturing…':'Looks good — keep steady';}
      else{goodFrames=0;qbadge.className='qbadge';qbadge.textContent=!bright?'Adjust the lighting':'Move closer / hold steady';}
      if(goodFrames>=10){busy=true;captureAndProcess(video);}
    }
    function fullCanvas(src){
      const vw=src.videoWidth||src.naturalWidth,vh=src.videoHeight||src.naturalHeight;
      const scale=Math.min(1,1600/vw),c=document.createElement('canvas');
      c.width=Math.round(vw*scale);c.height=Math.round(vh*scale);
      c.getContext('2d').drawImage(src,0,0,c.width,c.height);return c;
    }
    function captureAndProcess(src){busy=true;cancelAnimationFrame(raf);ocrFlow(fullCanvas(src));}
    function processFile(f){
      busy=true;cancelAnimationFrame(raf);
      const img=new Image();img.onload=()=>ocrFlow(fullCanvas(img));
      img.onerror=()=>{qbadge.className='qbadge warn';qbadge.textContent='Could not open that image.';busy=false;loop();};
      img.src=URL.createObjectURL(f);
    }
    async function ocrFlow(canvas){
      qbadge.className='qbadge ok';qbadge.textContent='Reading…';prog.textContent='Recognizing text… 0%';
      let data;
      try{data=await runOCR(canvas,p=>{prog.textContent='Recognizing text… '+Math.round(p*100)+'%';});}
      catch(e){prog.textContent='';qbadge.className='qbadge warn';qbadge.textContent='Reader needs internet to load. Use Upload, or type it in.';busy=false;return;}
      const text=((data&&data.text)||'').trim();
      const conf=Math.round((data&&data.confidence)||0);
      const words=text.split(/\s+/).filter(Boolean).length;
      // acceptance gate: enough clearly-read text before we accept the frame
      if(words<minWords||conf<minConf){
        prog.textContent='';qbadge.className='qbadge warn';
        qbadge.textContent='Text not clear enough — adjusting…';
        busy=false;goodFrames=0;if(!closed)loop();return;
      }
      const photo=downscalePhoto(canvas);
      stop();closeSheet();
      try{await Promise.resolve(opts.onResult(text,conf,photo));}
      catch(err){console.error('scanner onResult failed',err);toast('Something went wrong reading that — try again','warn');}
    }
    function stop(){closed=true;cancelAnimationFrame(raf);if(stream)stream.getTracks().forEach(t=>t.stop());}
    // stop camera if the sheet is dismissed by X / scrim
    const obs=new MutationObserver(()=>{if(!document.getElementById('rv')){stop();obs.disconnect();}});
    obs.observe($('#sheet-root'),{childList:true,subtree:true});
  });
}

/* turn cover OCR text into {title, author, query}. query = title+subtitle text
   (the most distinctive lines) — the author is kept separate because OCR mangling
   of accents/hyphens in a name can zero out an otherwise-good catalog search. */
function parseCover(text){
  const lines=(text||'').split(/\r?\n/).map(l=>l.replace(/\s+/g,' ').trim()).filter(l=>l.length>=2);
  if(!lines.length)return{title:'',author:'',query:''};
  const noise=/^(#?\s*1\b|new york times|national|international|the )?\s*(best\s?seller|bestselling|a cookbook|cookbook|recipes?|over \d+|more than|foreword|introduction|illustrated|winner|james beard|award[- ]winning|fully revised|expanded|edition|volume|copyright|by the author)/i;
  let author='';
  const byline=lines.find(l=>/^(written\s+)?by\s+/i.test(l));
  if(byline)author=byline.replace(/^(written\s+)?by\s+/i,'').trim();
  const cand=lines.slice(0,9).filter(l=>!noise.test(l)&&l!==byline&&!looksIngredientLine(l));
  // title (fallback display): prefer a prominent ALL-CAPS line, else the first candidate
  const caps=cand.find(l=>/[A-Z]/.test(l)&&l===l.toUpperCase()&&l.replace(/[^A-Za-z]/g,'').length>=3);
  let title=caps||cand[0]||lines[0]||'';
  if(!author){
    const name=lines.find(l=>l!==title&&/^([A-Z][A-Za-z.'’-]+\s+){1,2}[A-Z][A-Za-z.'’-]+$/.test(l)&&!noise.test(l));
    if(name)author=name;
  }
  const query=cand.slice(0,4).join(' ').replace(/\s+/g,' ').trim();
  return{title:title.replace(/[:,]\s*$/,'').trim(),author:author.trim(),query};
}
/* general book lookup from a free-text query (Google Books + Open Library, in parallel)
   → clean metadata + cover. Always resolves quickly; on failure returns the OCR fallback. */
async function lookupBook(query,fbTitle,fbAuthor){
  if(!query)return{found:false,title:fbTitle||'',author:fbAuthor||''};
  const [g,o]=await Promise.all([
    fetchJSON('https://www.googleapis.com/books/v1/volumes?q='+encodeURIComponent(query)+'&maxResults=1',6500),
    fetchJSON('https://openlibrary.org/search.json?q='+encodeURIComponent(query)+'&limit=1&fields=title,author_name,first_publish_year,cover_i,isbn,publisher',6500),
  ]);
  if(g&&g.totalItems>0){
    const v=g.items[0].volumeInfo;
    return{found:true,title:v.title||fbTitle,author:(v.authors||[]).join(', ')||fbAuthor,publisher:v.publisher||'',
      year:(v.publishedDate||'').slice(0,4),
      cover:((v.imageLinks&&(v.imageLinks.thumbnail||v.imageLinks.smallThumbnail))||'').replace('http://','https://'),
      isbn:((v.industryIdentifiers||[]).find(i=>/ISBN_13|ISBN_10/.test(i.type))||{}).identifier||''};
  }
  if(o&&o.docs&&o.docs.length){
    const d=o.docs[0];
    return{found:true,title:d.title||fbTitle,author:(d.author_name||[]).join(', ')||fbAuthor,
      year:d.first_publish_year?String(d.first_publish_year):'',publisher:(d.publisher||[])[0]||'',
      cover:d.cover_i?('https://covers.openlibrary.org/b/id/'+d.cover_i+'-M.jpg'):'',isbn:(d.isbn||[])[0]||''};
  }
  return{found:false,title:fbTitle||'',author:fbAuthor||''};
}

/* ---- OCR text → structured recipe candidates ---- */
const UNITS=['cup','cups','tablespoon','tablespoons','tbsp','tbs','tbsp.','teaspoon','teaspoons','tsp','tsp.','ounce','ounces','oz','pound','pounds','lb','lbs','gram','grams','g','kg','kilogram','ml','milliliter','liter','litre','l','pinch','pinches','clove','cloves','can','cans','package','packages','pkg','packet','jar','slice','slices','stick','sticks','bunch','sprig','sprigs','head','quart','quarts','pint','pints','gallon','dash','handful','piece','pieces'];
const FRAC='¼½¾⅓⅔⅕⅖⅗⅘⅙⅚⅛⅜⅝⅞';
function looksIngredientLine(l){
  l=l.trim();if(!l)return false;
  if(new RegExp('^([0-9'+FRAC+'\\u2022\\u25AA\\u25CF\\-\\*])').test(l))return true;
  const fw=(l.split(/\s+/)[0]||'').toLowerCase().replace(/[^a-z]/g,'');
  return UNITS.includes(fw);
}
function parseIngredientLine(line){
  let l=line.replace(new RegExp('^[\\u2022\\u25AA\\u25CF\\-\\*\\s]+'),'').trim();
  let qty='',rest=l;
  const qm=l.match(new RegExp('^((?:\\d+\\s+)?\\d+\\/\\d+|\\d+(?:\\.\\d+)?(?:\\s*[-\\u2013]\\s*\\d+(?:\\.\\d+)?)?|['+FRAC+']+)\\s+(.*)$'));
  if(qm){qty=qm[1].replace(/\s+/g,' ').trim();rest=qm[2].trim();}
  let unit='';
  const words=rest.split(/\s+/);
  if(words.length&&UNITS.includes((words[0]||'').toLowerCase().replace(/\.$/,''))){unit=words[0].replace(/\.$/,'');rest=words.slice(1).join(' ');}
  return{qty,unit,name:rest.trim()};
}
function splitIngredientsAndSteps(lines){
  const idxMethod=lines.findIndex(l=>/^(method|directions?|instructions?|preparation|steps|to (make|prepare|cook|finish)|how to)\b/i.test(l.trim()));
  const idxIng=lines.findIndex(l=>/^ingredients?\b/i.test(l.trim()));
  let ings=[],steps=[];
  if(idxMethod>=0){
    const start=(idxIng>=0&&idxIng<idxMethod)?idxIng+1:0;
    ings=lines.slice(start,idxMethod);steps=lines.slice(idxMethod+1);
  }else{
    let inSteps=false;const start=idxIng>=0?idxIng+1:0;
    for(let i=start;i<lines.length;i++){
      const l=lines[i];
      const longSentence=l.length>52||(/[.!?]$/.test(l)&&l.split(/\s+/).length>=8);
      if(!inSteps&&longSentence&&ings.length>=1&&!looksIngredientLine(l))inSteps=true;
      (inSteps?steps:ings).push(l);
    }
  }
  ings=ings.map(s=>s.trim()).filter(s=>s&&!/^ingredients?\b/i.test(s));
  steps=steps.map(s=>s.trim()).filter(Boolean);
  return{ings,steps};
}
function isTitleLine(t,nextLines){
  t=t.trim();if(!t)return false;
  const words=t.split(/\s+/);
  if(words.length>8||t.length>46)return false;
  if(/[.,:;]$/.test(t))return false;
  if((t.replace(/[^\d]/g,'').length)>2)return false;
  if(!/[A-Za-z]/.test(t))return false;
  if(/^(ingredients?|method|directions?|instructions?|serves|makes|prep|cook|total|yield|notes?)\b/i.test(t))return false;
  if(looksIngredientLine(t))return false;
  const titleCase = t===t.toUpperCase() || /^[A-Z]/.test(t);
  if(!titleCase)return false;
  const cueText=nextLines.join(' ').toLowerCase();
  const cue=/ingredient|serves|makes|prep|cook time|minute/.test(cueText)||nextLines.some(looksIngredientLine);
  return cue;
}
function parseRecipesFromText(text){
  const lines=(text||'').split(/\r?\n/).map(l=>l.replace(/\s+/g,' ').trim()).filter(Boolean);
  if(!lines.length)return[];
  const titleIdx=[];
  lines.forEach((l,i)=>{if(isTitleLine(l,lines.slice(i+1,i+5)))titleIdx.push(i);});
  let segments=[];
  if(titleIdx.length){
    // capture any leading content before the first title with the first recipe
    for(let k=0;k<titleIdx.length;k++){
      const start=titleIdx[k],end=k+1<titleIdx.length?titleIdx[k+1]:lines.length;
      segments.push({name:lines[start],body:lines.slice(start+1,end)});
    }
  }else{
    segments.push({name:lines[0],body:lines.slice(1)});
  }
  const out=[];
  segments.forEach(seg=>{
    const{ings,steps}=splitIngredientsAndSteps(seg.body);
    const ingredients=ings.map(parseIngredientLine).filter(i=>i.name);
    if(!ingredients.length&&!steps.length&&!seg.name)return;
    out.push({name:(seg.name||'Untitled recipe').replace(/\s+/g,' ').trim(),ingredients,steps});
  });
  return out.length?out:[{name:lines[0]||'Untitled recipe',ingredients:[],steps:lines}];
}

      (conf?' Read confidence ~'+conf+'%.':'')+(cands.length>1?' We split this page into '+cands.length+' recipes; delete or add as needed.':'')+'</div></div></div>'));
    if(photo)body.appendChild(el('<div class="center mb"><img src="'+photo+'" alt="scanned page" style="max-height:150px;border-radius:12px;box-shadow:var(--shadow)"></div>'));

    body.appendChild(el('<div class="field"><label>Save to cookbook</label><select id="rv-book">'+(bookOpts||'<option value="">— no cookbooks —</option>')+'</select></div>'));

    cands.forEach((c,i)=>host.appendChild(candBlock(c,i)));
    const add=el('<button class="addrow" style="padding:10px 0">'+svg('plus')+'Add another recipe</button>');
    add.onclick=()=>host.appendChild(candBlock({name:'',ingredients:[],steps:[]},host.children.length));

  },(foot,close)=>{
    const save=el('<button class="btn terra">Save '+(cands.length>1?'all':'recipe')+'</button>');
    save.onclick=()=>{
      const targetBook=($('#rv-book')&&$('#rv-book').value)||cookbookId;

      blocks.forEach(bl=>{
        const name=bl.querySelector('.c-name').value.trim();if(!name)return;

      });

      close();render();toast(plural(saved,'recipe')+' saved','ok');
    };
    foot.appendChild(save);
  });
}

function openScanSheet(cfg){
  let scanner=null,handling=false;
  const close=openSheet(cfg.title,(body)=>{

    body.appendChild(el('<div class="scan-wrap"><div id="reader"></div><div class="scan-frame"></div><div class="scan-line"></div></div>'));

      '<button class="btn sm terra" id="manual-go" style="width:auto">Look up</button></div>'+
      '<div class="hint">No camera? Type the number under the barcode.</div></div>';
    const mEl=el(manual);body.appendChild(mEl);
    if(cfg.onCover){
      const cv=el('<button class="btn ghost mt" style="width:100%"><span>'+svg('book')+'</span>No barcode? Photograph the cover</button>');
      cv.onclick=()=>{stopScanner();close();cfg.onCover();};
      body.appendChild(cv);
    }
    const status=$('#scan-status',body);
    async function stopScanner(){try{if(scanner){await scanner.stop().catch(()=>{});}}catch(e){}}
    async function handle(code){
      if(handling)return;handling=true;
      await stopScanner();
      const res=await cfg.onCode(code,status);
      if(res.ok){close();cfg.onResult(res.data);}
      else{status.textContent=res.msg||'No match.';
        if(res.fallback){close();cfg.onManual(res.fallback);} }
      handling=false;
    }
    $('#manual-go',body).onclick=()=>{const v=$('#manual-code',body).value.trim();if(v)handle(v);else toast('Enter a barcode number','warn');};
    $('#manual-code',body).addEventListener('keydown',e=>{if(e.key==='Enter'){const v=e.target.value.trim();if(v)handle(v);}});
    // start camera
    setTimeout(()=>startCamera(status,handle).then(s=>scanner=s).catch(()=>{}),250);
  });
  // ensure camera stops when sheet closes via scrim/X
  const obs=new MutationObserver(()=>{ if(!document.querySelector('#reader')&&scanner){try{scanner.stop().catch(()=>{});}catch(e){}obs.disconnect();} });
  obs.observe($('#sheet-root'),{childList:true,subtree:true});
}
async function startCamera(status,onCode){
  if(typeof Html5Qrcode==='undefined'){status.innerHTML='Scanner needs an internet connection to load. Use manual entry below. ';return null;}
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){status.textContent='No camera here — type the barcode below.';return null;}
  const scanner=new Html5Qrcode('reader',{verbose:false});
  let done=false;
  try{
    await scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:240,height:150}},
      (text)=>{ if(done)return;done=true; if(navigator.vibrate)navigator.vibrate(40); onCode(text.replace(/[^0-9Xx]/g,'')); },
      ()=>{});
    status.textContent='Scanning… hold steady over the barcode';
    return scanner;
  }catch(e){
    console.warn('camera',e);
    status.textContent='Camera unavailable (permission denied?). Type the barcode below.';
    return null;
  }
}

function hasData(d){ return d && ['cookbooks','recipes','pantry','grocery','mealPlan'].some(k=>Array.isArray(d[k])&&d[k].length); }
async function syncPull(){
  if(!sb||!session) return;
  try{
    const { data, error } = await sb.from('user_data').select('data').eq('user_id',session.user.id).maybeSingle();
    if(error){ console.warn('pull',error); return; }
    const remote=data&&data.data;
    if(hasData(remote)){ store.data=Object.assign(EMPTY_DATA(),remote); }
    else { store.data=EMPTY_DATA(); }
    localStorage.setItem(DB_KEY,JSON.stringify(store.data));
  }catch(e){ console.warn('pull',e); }
}
function scheduleSync(){ if(!sb||!session)return; clearTimeout(syncTimer); syncTimer=setTimeout(syncPush,800); }
async function syncPush(){
  if(!sb||!session) return;
  try{
    // a user_data row always exists (created by the signup trigger), so UPDATE is reliable;
    // insert only as a defensive fallback. (upsert+RLS-on-conflict was flaky.)
    const { data, error } = await sb.from('user_data')
      .update({data:store.data,updated_at:new Date().toISOString()})
      .eq('user_id',session.user.id).select('user_id');
    if(!error && (!data || !data.length)){
      await sb.from('user_data').insert({user_id:session.user.id,data:store.data});
    }
  }catch(e){ console.warn('push',e); }
}

  $('#g-code',g).addEventListener('keydown',e=>{if(e.key==='Enter')redeem.click();});
}

   Boot
   ========================================================================= */
function boot(){
  store.load();
  hookSync();
  if(initSupabase()){
    sb.auth.onAuthStateChange((_e,s)=>{ session=s; });
    evaluateGate();
  } else { showApp(); }
  if('serviceWorker' in navigator && location.protocol.startsWith('http')){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
}
window.cookcapable=window.mise={store,seedSample,openSettings,exportData,parseRecipesFromText,runOCR,parseCover,lookupBook,addToPlan,removeFromPlan,cookMeal,parseAmount,fmtAmount,normUnit,inPlan,
  evaluateGate,redeemCode,doSignOut,get sb(){return sb;},get session(){return session;},get entitlement(){return entitlement;}};
document.addEventListener('DOMContentLoaded',boot);
</script>
